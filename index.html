<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Final Frontier">
  <meta name="theme-color" content="#c8a840">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>Star Trek: Final Frontier — Fan Arcade</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('./sw.js')
          .catch(e => console.warn('SW:', e))
      );
    }
  </script>
</head>
<body>
  <!-- Portrait orientation overlay (Option A) -->
  <div id="rotate-msg" aria-hidden="true">
    <div class="rotate-inner">
      <div class="rotate-icon">⟳</div>
      <div class="rotate-ship">⚡</div>
      <p class="rotate-title">ROTATE TO ENGAGE</p>
      <p class="rotate-sub">Star Trek: Final Frontier requires<br>landscape orientation</p>
      <p class="rotate-hint">Rotate your device 90°</p>
    </div>
  </div>

  <div id="container">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
  </div>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/background.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/weapons.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/story.js"></script>
  <script src="js/bgexplosions.js"></script>
  <script src="js/titlemusic.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
